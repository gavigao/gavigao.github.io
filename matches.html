<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政国中统男子足球队 | 赛事战绩</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark team-navbar sticky-top" aria-label="主导航">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img src="img/logo-placeholder.png" alt="球队 Logo 占位" class="team-logo me-2">
          <span>政国中统足球队</span>
        </a>
        <button class="navbar-toggler text-white border border-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="切换导航">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="history.html">球队历史</a></li>
            <li class="nav-item"><a class="nav-link" href="roster.html">球队阵容</a></li>
            <li class="nav-item"><a class="nav-link active" href="matches.html">赛事战绩</a></li>
            <li class="nav-item"><a class="nav-link" href="honors.html">荣誉殿堂</a></li>
            <li class="nav-item"><a class="nav-link" href="gallery.html">相册</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="section-block">
      <div class="container">
        <h1 class="section-heading mb-1">赛事战绩</h1>
        <p class="section-subheading">支持按赛季切换并自动加载图表，数据来源于 data/matches.json。</p>

        <section class="mb-4">
          <h2 class="h5 mb-3">赛季筛选</h2>
          <div id="seasonFilters" class="filter-wrap"></div>
        </section>

        <section class="table-wrap p-3 mb-4">
          <h2 class="h5 mb-3">比赛结果</h2>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>赛事名称</th>
                  <th>对手</th>
                  <th>比分</th>
                  <th>胜负</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="matchesTableBody">
                <tr>
                  <td colspan="6">
                    <div class="empty-state">赛事数据加载中...</div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section>
          <h2 class="h5 mb-3">数据可视化</h2>
          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <article class="about-card p-3 h-100">
                <h3 class="h6 mb-3">近 5 个赛季胜平负堆叠柱状图</h3>
                <div style="height: 320px;">
                  <canvas id="resultChart"></canvas>
                </div>
              </article>
            </div>
            <div class="col-12 col-lg-6">
              <article class="about-card p-3 h-100">
                <h3 class="h6 mb-3">历史进球数折线图</h3>
                <div style="height: 320px;">
                  <canvas id="goalsChart"></canvas>
                </div>
              </article>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="team-footer py-4">
      <div class="container text-center">
        <p>政国中统男子足球队 · 建队于 2015</p>
        <p>Copyright © <span id="footerYear"></span> 政国中统男子足球队. All Rights Reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
